<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SOMS</title>
    <base href="/" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="app.css" />
    <link rel="icon" href="data:," />
</head>
<body>
    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">x</span>
    </div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        window.somsActivityTracker = {
            handlers: [],
            start(dotNetRef) {
                this.stop();
                const notify = () => dotNetRef.invokeMethodAsync("NotifyUserActivity");
                ["mousemove", "mousedown", "keydown", "touchstart"].forEach(eventName => {
                    document.addEventListener(eventName, notify, { passive: true });
                    this.handlers.push({ eventName, notify });
                });
            },
            stop() {
                this.handlers.forEach(({ eventName, notify }) => {
                    document.removeEventListener(eventName, notify);
                });
                this.handlers = [];
            }
        };

        window.somsFileDownload = {
            async downloadFileFromStream(fileName, contentStreamReference) {
                const arrayBuffer = await contentStreamReference.arrayBuffer();
                const blob = new Blob([arrayBuffer], { type: "text/csv;charset=utf-8" });
                const downloadUrl = URL.createObjectURL(blob);
                const anchorElement = document.createElement("a");
                anchorElement.href = downloadUrl;
                anchorElement.download = fileName;
                anchorElement.click();
                anchorElement.remove();
                URL.revokeObjectURL(downloadUrl);
            }
        };
    </script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>
</body>
</html>
